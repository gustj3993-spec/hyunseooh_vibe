<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심층 MBTI 성격 분석 프로그램</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --accent-color: #3498db;
            --bg-color: #f4f6f9;
            --text-main: #2d3436;
            --text-light: #636e72;
            --white: #ffffff;
            --border-color: #e0e6ed;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            line-height: 1.6;
        }

        #app {
            background-color: var(--white);
            width: 95%;
            max-width: 800px;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            padding: 50px 40px;
            box-sizing: border-box;
        }

        /* 공통 스타일 */
        h1, h2, h3 { color: var(--primary-color); margin-top: 0; }
        .text-center { text-align: center; }
        .hidden { display: none !important; }

        .btn {
            background-color: var(--accent-color);
            color: var(--white);
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            width: 100%;
            max-width: 300px;
            margin: 20px auto 0;
            display: block;
        }

        .btn:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }

        /* 시작 화면 */
        .intro-header { margin-bottom: 30px; }
        .intro-header h1 { font-size: 28px; margin-bottom: 10px; }
        .intro-desc { color: var(--text-light); font-size: 15px; margin-bottom: 40px; word-break: keep-all;}

        /* 질문 화면 */
        .progress-container {
            width: 100%;
            background-color: var(--border-color);
            border-radius: 8px;
            height: 8px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--accent-color);
            width: 0%;
            transition: width 0.4s ease;
        }

        .question-text {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 40px;
            word-break: keep-all;
            text-align: center;
        }

        .choice-btn {
            background-color: var(--white);
            color: var(--primary-color);
            border: 2px solid var(--border-color);
            padding: 24px 20px;
            margin-bottom: 16px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            align-items: center;
            font-weight: 500;
        }

        .choice-btn:hover {
            border-color: var(--accent-color);
            background-color: #f0f8ff;
        }

        .choice-btn::before {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            margin-right: 15px;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .choice-btn:hover::before {
            border-color: var(--accent-color);
            background-color: var(--accent-color);
            box-shadow: inset 0 0 0 4px var(--white);
        }

        /* 결과 화면 */
        .result-header { text-align: center; border-bottom: 1px solid var(--border-color); padding-bottom: 30px; margin-bottom: 30px; }
        .emoji-box { font-size: 64px; margin-bottom: 10px; }
        .mbti-type { font-size: 42px; font-weight: 800; color: var(--accent-color); margin-bottom: 5px; letter-spacing: 2px; }
        .mbti-title { font-size: 22px; font-weight: 700; color: var(--primary-color); margin-bottom: 15px; }
        .mbti-summary { font-size: 16px; color: var(--text-light); max-width: 600px; margin: 0 auto; word-break: keep-all; }

        .result-section { margin-bottom: 30px; }
        .result-section h3 { font-size: 18px; border-left: 4px solid var(--accent-color); padding-left: 10px; margin-bottom: 15px; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .card { background: #f8f9fa; padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        .card h4 { margin-top: 0; margin-bottom: 15px; font-size: 16px; display: flex; align-items: center; gap: 8px; }
        
        ul.custom-list { list-style: none; padding: 0; margin: 0; }
        ul.custom-list li { position: relative; padding-left: 18px; margin-bottom: 10px; font-size: 15px; color: var(--text-main); word-break: keep-all; }
        ul.custom-list li::before { content: '•'; position: absolute; left: 0; color: var(--accent-color); font-weight: bold; }

        .work-style { background-color: #f0f8ff; padding: 20px; border-radius: 12px; margin-top: 20px; }
        .work-style p { margin: 0; font-size: 15px; color: var(--text-main); }

        @media (max-width: 600px) {
            .grid-2 { grid-template-columns: 1fr; }
            #app { padding: 30px 20px; }
            .mbti-type { font-size: 36px; }
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- 인트로 화면 -->
        <div id="start-screen" class="text-center">
            <div class="intro-header">
                <h1>심층 성격 분석 시스템</h1>
                <div class="emoji-box">🧠</div>
            </div>
            <p class="intro-desc">
                본 테스트는 32개의 문항을 통해 당신의 행동 양식, 인지 구조, 의사결정 방식 및 생활 양식을 분석합니다.<br>
                결과에서는 성격의 본질적 특징, 장단점, 업무 스타일, 그리고 성장을 위한 전문적인 솔루션을 제공합니다.
            </p>
            <button class="btn" onclick="startTest()">분석 시작하기</button>
        </div>

        <!-- 질문 화면 -->
        <div id="question-screen" class="hidden">
            <div class="progress-container">
                <div class="progress-bar" id="progress"></div>
            </div>
            <div class="text-center" style="color: var(--text-light); font-size: 14px; margin-bottom: 10px;" id="q-counter">1 / 32</div>
            <h2 class="question-text" id="question-text">질문 내용</h2>
            <div id="choices-container">
                <button class="choice-btn" id="choice1" onclick="selectAnswer(0)">선택지 1</button>
                <button class="choice-btn" id="choice2" onclick="selectAnswer(1)">선택지 2</button>
            </div>
        </div>

        <!-- 결과 화면 -->
        <div id="result-screen" class="hidden">
            <div class="result-header">
                <div class="emoji-box" id="result-emoji"></div>
                <div class="mbti-type" id="result-mbti"></div>
                <div class="mbti-title" id="result-title"></div>
                <p class="mbti-summary" id="result-summary"></p>
            </div>

            <div class="result-section">
                <h3>주요 성격 특징</h3>
                <div class="card">
                    <ul class="custom-list" id="characteristics-list"></ul>
                </div>
            </div>

            <div class="grid-2 result-section">
                <div class="card">
                    <h4 style="color: #2980b9;">🔵 핵심 강점 (Strengths)</h4>
                    <ul class="custom-list" id="strengths-list"></ul>
                </div>
                <div class="card">
                    <h4 style="color: #e74c3c;">🔴 잠재적 약점 (Weaknesses)</h4>
                    <ul class="custom-list" id="weaknesses-list"></ul>
                </div>
            </div>

            <div class="result-section">
                <h3>성장을 위한 보완점 (Solutions)</h3>
                <div class="card" style="border-left: 4px solid #27ae60;">
                    <ul class="custom-list" id="improvements-list"></ul>
                </div>
            </div>

            <div class="result-section">
                <h3>💼 전문/업무 스타일 (Work Style)</h3>
                <div class="work-style">
                    <p id="work-style-text"></p>
                </div>
            </div>

            <button class="btn" onclick="location.reload()">새로운 분석 진행하기</button>
        </div>
    </div>

    <script>
        // 1. 질문 데이터 (총 32문항)
        const questions = [
            { q: "새로운 프로젝트를 시작할 때 나의 에너지는 주로 어디로 향하는가?", choices: [{ text: "외부로 향하며, 관련 담당자들과 아이디어를 나누고 토론한다.", type: "E" }, { text: "내면으로 향하며, 혼자 자료를 조사하고 생각을 정리한다.", type: "I" }] },
            { q: "낯선 사람들과 네트워킹을 해야 하는 상황에서 나는?", choices: [{ text: "먼저 다가가 인사를 건네며 대화를 주도하는 편이다.", type: "E" }, { text: "누군가 말을 걸어주기를 기다리며 관찰하는 편이다.", type: "I" }] },
            { q: "휴일에 에너지를 충전하는 가장 이상적인 방법은?", choices: [{ text: "친구들이나 지인들과 활발하게 활동하며 시간을 보낸다.", type: "E" }, { text: "외부의 자극을 차단하고 혼자만의 고요한 시간을 갖는다.", type: "I" }] },
            { q: "회의 중 내 의견을 전달하는 방식은?", choices: [{ text: "생각나는 대로 즉각적으로 말하며 생각을 발전시킨다.", type: "E" }, { text: "머릿속으로 충분히 정리하고 검증한 후 발언한다.", type: "I" }] },
            { q: "나의 인간관계 네트워크는?", choices: [{ text: "넓고 다양한 분야의 사람들과 두루 친분을 유지한다.", type: "E" }, { text: "소수의 사람들과 깊고 끈끈한 유대관계를 맺는다.", type: "I" }] },
            { q: "갈등 상황이 발생했을 때 즉각적인 반응은?", choices: [{ text: "직접 대화로 부딪혀서 상황을 빠르게 해결하려 한다.", type: "E" }, { text: "혼자 감정과 상황을 정리할 시간이 우선 필요하다.", type: "I" }] },
            { q: "새로운 취미를 배울 때 선호하는 환경은?", choices: [{ text: "다수와 함께 교류하며 배우는 그룹 클래스", type: "E" }, { text: "혼자 집중할 수 있는 독학이나 1:1 레슨", type: "I" }] },
            { q: "나의 의사소통 스타일은?", choices: [{ text: "말하기를 선호하며, 표정과 제스처가 풍부한 편이다.", type: "E" }, { text: "글쓰기를 선호하며, 차분하고 신중하게 표현한다.", type: "I" }] },

            { q: "정보를 받아들일 때 내가 더 신뢰하는 것은?", choices: [{ text: "실제 경험, 구체적인 데이터와 확실한 사실", type: "S" }, { text: "직관, 이면의 의미, 앞으로의 가능성과 비전", type: "N" }] },
            { q: "업무 지시를 받을 때 선호하는 방식은?", choices: [{ text: "명확한 매뉴얼과 구체적인 단계별 가이드라인", type: "S" }, { text: "큰 그림과 최종 목표만 주어지는 자율적인 환경", type: "N" }] },
            { q: "사물을 묘사하거나 설명할 때 나는?", choices: [{ text: "눈에 보이는 색상, 크기, 형태 등을 사실적으로 묘사한다.", type: "S" }, { text: "그 사물이 주는 느낌이나 비유, 상징을 통해 묘사한다.", type: "N" }] },
            { q: "미래를 대비하는 나의 자세는?", choices: [{ text: "현재 당면한 현실적인 문제를 해결하는 데 집중한다.", type: "S" }, { text: "5년, 10년 뒤의 장기적인 청사진을 그리는 것을 즐긴다.", type: "N" }] },
            { q: "새로운 기술이나 제품을 접했을 때?", choices: [{ text: "이것이 당장 내 삶에 어떤 실용적인 도움을 주는지 본다.", type: "S" }, { text: "이 기술이 미래 사회를 어떻게 변화시킬지 상상한다.", type: "N" }] },
            { q: "문제에 직면했을 때 접근 방식은?", choices: [{ text: "과거의 경험과 검증된 선례를 바탕으로 해결책을 찾는다.", type: "S" }, { text: "기존의 틀을 깨는 새롭고 독창적인 방법을 시도해본다.", type: "N" }] },
            { q: "대화 중 내가 흥미를 잃는 순간은?", choices: [{ text: "현실성 없는 뜬구름 잡는 공상이나 철학적 이야기일 때", type: "S" }, { text: "단순한 일상 이야기나 너무 세세한 팩트 나열일 때", type: "N" }] },
            { q: "내가 선호하는 아이디어의 형태는?", choices: [{ text: "즉시 실행 가능하고 실현 확률이 높은 아이디어", type: "S" }, { text: "혁신적이고 영감을 주지만 다소 모험적인 아이디어", type: "N" }] },

            { q: "동료가 업무적 실수를 했을 때 나의 첫 반응은?", choices: [{ text: "무엇이 문제였는지 원인을 파악하고 해결책을 제시한다.", type: "T" }, { text: "실수해서 당황했을 동료의 마음을 먼저 위로해준다.", type: "F" }] },
            { q: "의사결정을 내릴 때 가장 중요하게 고려하는 기준은?", choices: [{ text: "어떤 선택이 객관적으로 가장 합리적이고 공정한가?", type: "T" }, { text: "어떤 선택이 관련된 사람들을 가장 행복하게 할 것인가?", type: "F" }] },
            { q: "비판적인 피드백을 전달해야 할 때 나는?", choices: [{ text: "감정을 배제하고 사실과 개선점을 명확하게 전달한다.", type: "T" }, { text: "상대방이 상처받지 않도록 최대한 돌려서 부드럽게 말한다.", type: "F" }] },
            { q: "타인에게 인정받고 싶을 때 내가 듣고 싶은 말은?", choices: [{ text: "'당신의 분석과 논리가 정말 날카롭고 훌륭합니다.'", type: "T" }, { text: "'당신의 배려와 따뜻함 덕분에 정말 큰 힘이 되었습니다.'", type: "F" }] },
            { q: "팀의 리더로서 더 지향하는 조직 문화는?", choices: [{ text: "성과 중심, 원칙 준수, 철저한 보상과 피드백", type: "T" }, { text: "관계 중심, 상호 존중, 팀원 간의 정서적 교감", type: "F" }] },
            { q: "친구가 '나 우울해서 화분 샀어'라고 말한다면?", choices: [{ text: "무슨 식물 샀는데? 물은 얼마나 줘야 돼?", type: "T" }, { text: "무슨 일 있어? 왜 우울해 ㅠㅠ", type: "F" }] },
            { q: "어떤 사람을 볼 때 더 답답함을 느끼는가?", choices: [{ text: "논리적 근거 없이 감정적으로만 호소하는 사람", type: "T" }, { text: "타인의 감정을 무시하고 차갑게 팩트만 찌르는 사람", type: "F" }] },
            { q: "나의 행동을 움직이는 가장 큰 동력은?", choices: [{ text: "원칙, 진실, 인과관계를 밝히고자 하는 이성", type: "T" }, { text: "신념, 가치, 타인과 조화를 이루고자 하는 감성", type: "F" }] },

            { q: "중요한 일정을 앞두고 나의 행동 양식은?", choices: [{ text: "세부 계획을 미리 수립하고 일정표에 따라 진행한다.", type: "J" }, { text: "상황에 따라 유연하게 대처하며 즉흥적으로 진행한다.", type: "P" }] },
            { q: "여행을 떠날 때 나의 스타일은?", choices: [{ text: "교통, 숙박, 식당 예약까지 동선별로 완벽히 세팅한다.", type: "J" }, { text: "대략적인 목적지만 정하고 발길이 닿는 대로 즐긴다.", type: "P" }] },
            { q: "업무의 마감 기한이 주어졌을 때?", choices: [{ text: "일정을 분배하여 마감일 전에 여유롭게 끝내놓는다.", type: "J" }, { text: "마감일 직전의 엄청난 압박감 속에서 초인적인 힘을 발휘한다.", type: "P" }] },
            { q: "일상생활에서 내가 더 편안함을 느끼는 상태는?", choices: [{ text: "주변 환경이 정리정돈되어 있고 통제 가능한 상태", type: "J" }, { text: "언제든 새로운 선택을 할 수 있게 열려있는 자유로운 상태", type: "P" }] },
            { q: "예상치 못한 변수나 돌발 상황이 발생했을 때?", choices: [{ text: "세워둔 계획이 틀어지는 것에 대해 큰 스트레스를 받는다.", type: "J" }, { text: "순발력을 발휘하여 상황에 맞게 새로운 방식을 찾는다.", type: "P" }] },

            const listElement = document.getElementById(listId);
            listElement.innerHTML = "";
            dataArray.forEach(item => {
                let li = document.createElement("li");
                li.innerText = item;
                listElement.appendChild(li);
            });
        }

        function showResult() {
            questionScreen.classList.add("hidden");
            resultScreen.classList.remove("hidden");
            window.scrollTo(0, 0); // 결과창 진입 시 상단으로 이동

            // 최종 MBTI 도출
            const E_or_I = scores.E >= scores.I ? "E" : "I";
            const S_or_N = scores.S >= scores.N ? "S" : "N";
            const T_or_F = scores.T >= scores.F ? "T" : "F";
            const J_or_P = scores.J >= scores.P ? "J" : "P";
            
            const finalMBTI = E_or_I + S_or_N + T_or_F + J_or_P;
            const resultData = results[finalMBTI];

            // 텍스트 바인딩
            document.getElementById("result-mbti").innerText = finalMBTI;
            document.getElementById("result-emoji").innerText = resultData.emoji;
            document.getElementById("result-title").innerText = resultData.title;
            document.getElementById("result-summary").innerText = resultData.summary;

            // 리스트 바인딩
            populateList("characteristics-list", resultData.characteristics);
            populateList("strengths-list", resultData.strengths);
            populateList("weaknesses-list", resultData.weaknesses);
            populateList("improvements-list", resultData.improvements);

            // 업무 스타일 바인딩
            document.getElementById("work-style-text").innerText = resultData.workStyle;
        }
    </script>
</body>
</html>
